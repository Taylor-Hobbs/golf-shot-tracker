<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Shots</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
html,body { background:#000; color:#fff; font-family:-apple-system,system-ui,sans-serif; height:100%; overflow:hidden; }
button { font-family:inherit; border:none; border-radius:8px; color:#fff; background:#1c1c1e; font-weight:700; }
button:active { background:#3a3a3c; }
.screen { display:none; flex-direction:column; height:100dvh; padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
.screen.on { display:flex; }

/* ---- start screen ---- */
#start { justify-content:center; gap:16px; padding:24px; }
#start h1 { font-size:28px; text-align:center; color:#8e8e93; font-weight:600; }
#btnStart { height:110px; font-size:34px; background:#0a84ff; }
#btnResume { height:110px; font-size:34px; background:#30d158; color:#000; display:none; }
#btnExportAll { height:64px; font-size:20px; }
#roundCount { text-align:center; color:#8e8e93; font-size:15px; }

/* ---- play screen ---- */
#hdr { display:flex; align-items:center; gap:8px; padding:6px 10px; height:52px; flex:none; }
#btnEnd { width:64px; height:44px; font-size:14px; color:#ff453a; background:#1c1c1e; }
#holeInfo { flex:1; text-align:center; font-size:20px; font-weight:800; letter-spacing:.5px; }
#holeInfo small { color:#8e8e93; font-weight:600; }
#btnNext { width:96px; height:44px; font-size:17px; background:#2c2c2e; }

#yards { flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; min-height:0; }
#yC { font-size:26vw; font-weight:900; line-height:.9; font-variant-numeric:tabular-nums; }
.fb { display:flex; gap:14vw; font-size:8.5vw; font-weight:700; color:#8e8e93; font-variant-numeric:tabular-nums; }
.fb span b { color:#c7c7cc; }
#viewRow { display:flex; gap:10px; align-items:center; margin-top:6px; }
#viewRow button { font-size:13px; font-weight:800; padding:6px 14px; background:#1c1c1e; color:#8e8e93; min-height:34px; }
#viewRow button.on { color:#fff; background:#2c2c2e; }
#miniY { display:none; font-size:5vw; font-weight:800; color:#c7c7cc; font-variant-numeric:tabular-nums; padding:2px 0; }
#miniY small { color:#8e8e93; font-weight:600; }
#map { display:none; width:100%; flex:1; min-height:0; touch-action:manipulation; }
.mapmode #yC, .mapmode .fb { display:none; }
.mapmode #miniY { display:block; }
.mapmode #map { display:block; }

#card { display:none; position:fixed; inset:0; background:rgba(0,0,0,.96); z-index:20; flex-direction:column; padding:18px 10px calc(18px + env(safe-area-inset-bottom)); gap:10px; overflow-y:auto; }
#card.on { display:flex; }
#card h3 { text-align:center; font-size:20px; }
#cardBody { display:flex; gap:8px; justify-content:center; }
.ninetbl { border-collapse:collapse; flex:1; max-width:200px; }
.ninetbl th, .ninetbl td { border:1px solid #2c2c2e; padding:5px 4px; text-align:center; font-size:14px; font-variant-numeric:tabular-nums; }
.ninetbl th { color:#8e8e93; font-weight:700; font-size:12px; }
.ninetbl .tot td { font-weight:800; background:#1c1c1e; }
.ninetbl .cur td { background:#0a2a4a; }
#cardSum { text-align:center; font-size:18px; font-weight:800; }
#cardClose { height:52px; font-size:17px; flex:none; }
#gps { font-size:14px; font-weight:700; padding:2px 10px; border-radius:10px; }
.gps-ok { color:#30d158; background:#0e2b16; }
.gps-warn { color:#ffd60a; background:#2b250a; }
.gps-bad { color:#ff453a; background:#2b0e0c; }

#toast { height:26px; flex:none; text-align:center; font-size:17px; font-weight:700; color:#ffd60a; }

#util { display:grid; grid-template-columns:1.2fr 1fr 1fr 1fr; gap:6px; padding:0 8px; height:58px; flex:none; }
#util button { font-size:15px; font-weight:700; }
#btnPutt { background:#2c2c2e; font-size:17px; }

#clubs { display:grid; grid-template-columns:repeat(4,1fr); grid-auto-rows:1fr; gap:6px; padding:8px; height:32dvh; flex:none; }
#clubs button { font-size:22px; min-height:60px; background:#1c1c1e; }
#clubs button.sel { background:#0a84ff; }

#btnHit { height:11dvh; min-height:76px; margin:0 8px 8px; font-size:38px; letter-spacing:4px; background:#30d158; color:#000; opacity:.35; flex:none; }
#btnHit.armed { opacity:1; }

/* ---- overlay club picker ---- */
#overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:10; flex-direction:column; justify-content:center; padding:16px; gap:10px; }
#overlay.on { display:flex; }
#ovTitle { text-align:center; font-size:22px; font-weight:800; }
#ovGrid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
#ovGrid button { font-size:22px; min-height:64px; }
#ovCancel { height:56px; font-size:18px; color:#ff453a; }

/* ---- done screen ---- */
#done { justify-content:center; gap:16px; padding:24px; }
#done h2 { text-align:center; font-size:26px; }
#doneSummary { text-align:center; color:#8e8e93; font-size:17px; white-space:pre-line; }
#btnExportRound { height:110px; font-size:30px; background:#0a84ff; }
#btnDoneHome { height:56px; font-size:18px; }
</style>
</head>
<body>

<div id="start" class="screen on">
  <h1>Werribee Park</h1>
  <button id="btnResume">RESUME ROUND</button>
  <button id="btnStart">START ROUND</button>
  <button id="btnExportAll">Export all rounds</button>
  <div id="roundCount"></div>
</div>

<div id="play" class="screen">
  <div id="hdr">
    <button id="btnEnd">END</button>
    <div id="holeInfo"></div>
    <button id="btnNext">NEXT &#9654;</button>

    <div class="fb"><span>B <b id="yB">–</b></span></div>
    <canvas id="map"></canvas>
    <div id="viewRow">
      <button id="btnMap">MAP</button>
      <div id="gps" class="gps-bad">NO GPS</div>
      <button id="btnCard">CARD</button>
    </div>
  </div>
  <div id="toast"></div>
  <div id="util">
    <button id="btnPutt">+ PUTT</button>
    <button id="btnMissed">MISSED ONE</button>
    <button id="btnUndo">UNDO</button>
    <button id="btnEditClub">&#9998; CLUB</button>
  </div>
  <div id="clubs"></div>
  <button id="btnHit">HIT</button>
</div>

<div id="overlay">
  <div id="ovTitle"></div>
  <div id="ovGrid"></div>
  <button id="ovCancel">Cancel</button>
</div>

<div id="card">
  <h3>Scorecard</h3>
  <div id="cardSum"></div>
  <div id="cardBody"></div>
  <button id="cardClose">Close</button>
</div>

<div id="done" class="screen">
  <h2>Round over</h2>
  <div id="doneSummary"></div>
  <button id="btnExportRound">EXPORT ROUND</button>
  <button id="btnDoneHome">Done</button>
</div>

// Edit this to match the bag. 14 max — grid is 4 wide.
const CLUBS = ["DR","3W","5W","4H","5i","6i","7i","8i","9i","PW","GW","SW","LW","CHIP"];

const LS_CUR = "golf_current_v1";
const LS_ROUNDS = "golf_rounds_v1";
const ACC_LIMIT = 8;        // metres — fixes worse than this are never recorded
const FIX_FRESH_MS = 10000; // fix older than this shows as stale
const FIX_DEAD_MS  = 45000; // fix older than this = treated as no GPS

// ---------- state ----------
let round = null;        // {id, course, startTs, hole, shots:[...]}
let lastFix = null;      // {lat, lon, accuracy, fixTs} — only fixes with accuracy <= ACC_LIMIT
let lastRawAcc = null;   // accuracy of most recent raw fix, good or bad (for display)
let selClub = null;
let watchId = null;
let wakeLock = null;
let toastTimer = null;

const $ = id => document.getElementById(id);

// ---------- persistence ----------
function saveCur() { localStorage.setItem(LS_CUR, JSON.stringify(round)); }
function loadCur() { try { return JSON.parse(localStorage.getItem(LS_CUR)); } catch { return null; } }
function loadRounds() { try { return JSON.parse(localStorage.getItem(LS_ROUNDS)) || []; } catch { return []; } }

// ---------- geometry ----------
function hav(aLat, aLon, bLat, bLon) {
  const r = Math.PI / 180, R = 6371000;
  const s = Math.sin((bLat-aLat)*r/2)**2 + Math.cos(aLat*r)*Math.cos(bLat*r)*Math.sin((bLon-aLon)*r/2)**2;
  return 2 * R * Math.asin(Math.sqrt(s));
}

// ---------- hole map ----------
// Vector overlay drawn from the OSM polygons baked into COURSE — no tiles,
// fully offline. Rotated so the tee is at the bottom and the green at the top.
let mapMode = false;
let target = null; // {lat, lon} — tap-to-measure point, cleared on hole change
let mapT = null;   // current transform, rebuilt each draw

function buildTransform(hole, w, h) {
  const ref = hole.green.centre;
  const toM = p => [
    (p[1] - ref[1]) * Math.cos(ref[0] * Math.PI / 180) * 111320,
    (p[0] - ref[0]) * 110540
  ];
  const teePt = Object.values(hole.tees)[0] || hole.green.centre;
  const [vE, vN] = toM(teePt).map(x => -x); // tee -> green vector
  const A = Math.atan2(vE, vN);             // rotate so it points screen-up
  const cosA = Math.cos(A), sinA = Math.sin(A);
  const rot = p => { const [E, N] = toM(p); return [cosA*E - sinA*N, sinA*E + cosA*N]; };

  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  const eat = p => { const [x, y] = rot(p); minX = Math.min(minX,x); maxX = Math.max(maxX,x); minY = Math.min(minY,y); maxY = Math.max(maxY,y); };
  hole.green.poly.forEach(eat);
  Object.values(hole.tees).forEach(eat);
  hole.features.forEach(f => f.poly.forEach(eat));
  const pad = 20;
  minX -= pad; maxX += pad; minY -= pad; maxY += pad;
  const scale = Math.min(w / (maxX - minX), h / (maxY - minY));
  const ox = (w - (maxX - minX) * scale) / 2;
  const oy = (h - (maxY - minY) * scale) / 2;

  return {
    toPx: p => { const [x, y] = rot(p); return [ox + (x - minX) * scale, h - oy - (y - minY) * scale]; },
    toLL: (px, py) => {
      const x = (px - ox) / scale + minX, y = (h - py - oy) / scale + minY;
      const E = cosA*x + sinA*y, N = -sinA*x + cosA*y;
      return [ref[0] + N / 110540, ref[1] + E / (111320 * Math.cos(ref[0] * Math.PI / 180))];
    }
  };
}

function drawMap() {
  const cv = $("map");
  const cur = COURSE.holes.find(x => x.num === round.hole);
  if (!cur || !cur.green) return;
  const rect = cv.getBoundingClientRect();
  if (rect.width < 10 || rect.height < 10) return;
  const dpr = window.devicePixelRatio || 1;
  cv.width = rect.width * dpr; cv.height = rect.height * dpr;
  const ctx = cv.getContext("2d");
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;
  mapT = buildTransform(cur, w, h);
  const T = mapT.toPx;

  ctx.fillStyle = "#0b140d"; ctx.fillRect(0, 0, w, h); // rough
  const poly = (pts, fill) => {
    ctx.beginPath();
    pts.forEach((p, i) => { const [x, y] = T(p); i ? ctx.lineTo(x, y) : ctx.moveTo(x, y); });
    ctx.closePath(); ctx.fillStyle = fill; ctx.fill();
  };
  for (const f of cur.features) if (f.type === "fairway") poly(f.poly, "#1d4024");
  for (const f of cur.features) if (f.type === "water") poly(f.poly, "#1c4a6e");
  for (const f of cur.features) if (f.type === "bunker") poly(f.poly, "#c2a25a");
  poly(cur.green.poly, "#2f7d3d");

  const dot = (p, r, fill, ring) => {
    const [x, y] = T(p);
    ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fillStyle = fill; ctx.fill();
    if (ring) { ctx.lineWidth = 2; ctx.strokeStyle = ring; ctx.stroke(); }
    return [x, y];
  };
  for (const t of Object.values(cur.tees)) dot(t, 4, "#3a3a3c", "#8e8e93");
  for (const s of swings(round.hole)) if (s.lat != null) dot([s.lat, s.lon], 4, "#fff");

  const label = (x, y, txt) => {
    ctx.font = "800 15px -apple-system,system-ui,sans-serif";
    const tw = ctx.measureText(txt).width;
    const bx = Math.min(Math.max(x - tw/2 - 5, 2), w - tw - 12), by = Math.max(y, 12);
    ctx.fillStyle = "rgba(0,0,0,.75)"; ctx.fillRect(bx, by - 12, tw + 10, 20);
    ctx.fillStyle = "#ffd60a"; ctx.fillText(txt, bx + 5, by + 3);
  };
  const line = (a, b) => {
    ctx.beginPath(); ctx.moveTo(a[0], a[1]); ctx.lineTo(b[0], b[1]);
    ctx.lineWidth = 1.5; ctx.setLineDash([5, 4]); ctx.strokeStyle = "#ffd60a"; ctx.stroke(); ctx.setLineDash([]);
  };

  const age = lastFix ? Date.now() - lastFix.fixTs : Infinity;
  const me = (lastFix && age <= FIX_DEAD_MS) ? [lastFix.lat, lastFix.lon] : null;
  let mePx = null;
  if (me) {
    const [x, y] = T(me);
    if (x > -50 && x < w + 50 && y > -50 && y < h + 50) mePx = dot(me, 6, "#0a84ff", "#fff");
  }
  if (target) {
    const tPx = T(target);
    ctx.beginPath(); ctx.arc(tPx[0], tPx[1], 8, 0, 7);
    ctx.lineWidth = 2.5; ctx.strokeStyle = "#ffd60a"; ctx.stroke();
    const gPx = T(cur.green.centre);
    line(tPx, gPx);
    label((tPx[0]+gPx[0])/2, (tPx[1]+gPx[1])/2, Math.round(hav(target[0], target[1], cur.green.centre[0], cur.green.centre[1])) + "m");
    if (mePx) {
      line(mePx, tPx);
      label((mePx[0]+tPx[0])/2, (mePx[1]+tPx[1])/2, Math.round(hav(me[0], me[1], target[0], target[1])) + "m");
    }
  }
}

$("map").addEventListener("click", e => {
  if (!mapT || !round) return;
  const rect = $("map").getBoundingClientRect();
  const ll = mapT.toLL(e.clientX - rect.left, e.clientY - rect.top);
  // tap on/near the existing target clears it
  if (target && hav(target[0], target[1], ll[0], ll[1]) < 12) target = null;
  else target = ll;
  render();
});

// ---------- scorecard ----------
function cardHtml() {
  const played = h => holeShots(h).length > 0;
  const nine = holes => {
    let rows = '<tr><th>H</th><th>Par</th><th>Scr</th><th>Putt</th></tr>', sp = 0, ss = 0, pp = 0;
    for (const hn of holes) {
      const ch = COURSE.holes.find(x => x.num === hn);
      const sc = holeShots(hn).length, pt = putts(hn).length;
      if (played(hn)) { sp += ch.par; ss += sc; pp += pt; }
      rows += `<tr${hn === (round ? round.hole : 0) ? ' class="cur"' : ''}><td>${hn}</td><td>${ch.par}</td><td>${played(hn) ? sc : ''}</td><td>${played(hn) ? pt : ''}</td></tr>`;
    }
    rows += `<tr class="tot"><td></td><td>${holes.reduce((s,hn)=>s+COURSE.holes.find(x=>x.num===hn).par,0)}</td><td>${ss || ''}</td><td>${pp || ''}</td></tr>`;
    return { html: '<table class="ninetbl">' + rows + '</table>', sp, ss, pp };
  };
  const out = nine([1,2,3,4,5,6,7,8,9]), inn = nine([10,11,12,13,14,15,16,17,18]);
  const strokes = out.ss + inn.ss, parPlayed = out.sp + inn.sp;
  const diff = strokes - parPlayed;
  return {
    body: out.html + inn.html,
    sum: strokes ? `${strokes} strokes · ${diff === 0 ? 'E' : (diff > 0 ? '+' : '') + diff} thru played holes · ${out.pp + inn.pp} putts` : 'No shots yet'
  };
}
function showCard() {
  const c = cardHtml();
  $("cardBody").innerHTML = c.body;
  $("cardSum").textContent = c.sum;
  $("card").classList.add("on");
}
$("btnCard").onclick = () => { if (round) showCard(); };
$("cardClose").onclick = () => $("card").classList.remove("on");
$("btnMap").onclick = () => {
  mapMode = !mapMode;
  $("play").classList.toggle("mapmode", mapMode);
  $("btnMap").classList.toggle("on", mapMode);
  render();
};

// ---------- GPS ----------
function startGPS() {
  if (watchId !== null || !("geolocation" in navigator)) return;
  watchId = navigator.geolocation.watchPosition(onFix, () => {}, {
    enableHighAccuracy: true, maximumAge: 0, timeout: 5000
  });
}
function stopGPS() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
}
function onFix(pos) {
  lastRawAcc = pos.coords.accuracy;
  if (pos.coords.accuracy <= ACC_LIMIT) {
    lastFix = { lat: pos.coords.latitude, lon: pos.coords.longitude,
                accuracy: pos.coords.accuracy, fixTs: Date.now() };
  }
  render();
}

// ---------- wake lock ----------
async function acquireLock() {
  try {
    wakeLock = await navigator.wakeLock.request("screen");
    wakeLock.addEventListener("release", () => { wakeLock = null; });
  } catch { wakeLock = null; }
}
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") {
    if (round) { acquireLock(); startGPS(); }
  } else {
    stopGPS();
  }
});
// iOS drops the lock silently; any tap during a round re-acquires it.
document.addEventListener("click", () => { if (round && !wakeLock) acquireLock(); });

// ---------- round ----------
function holeShots(h) { return round.shots.filter(s => s.hole === h); }
function swings(h) { return holeShots(h).filter(s => s.club !== "PUTT"); }
function putts(h) { return holeShots(h).filter(s => s.club === "PUTT"); }

function startRound() {
  round = { id: Date.now(), course: COURSE.name, startTs: Date.now(), hole: 1, shots: [] };
  saveCur();
  enterPlay();
}
function resumeRound() {
  round = loadCur();
  if (round) enterPlay();
}
function enterPlay() {
  show("play");
  acquireLock();
  startGPS();
  render();
}

function appendShot(club, useFix, estimated) {
  const h = round.hole;
  const fixOk = useFix && lastFix && (Date.now() - lastFix.fixTs) < FIX_DEAD_MS;
  const shot = {
    ts: Date.now(),
    lat: fixOk ? lastFix.lat : null,
    lon: fixOk ? lastFix.lon : null,
    accuracy: fixOk ? lastFix.accuracy : null,
    fixTs: fixOk ? lastFix.fixTs : null,
    club, hole: h,
    shotNum: holeShots(h).length + 1
  };
  if (estimated || (useFix && !fixOk)) shot.estimated = true;
  round.shots.push(shot);
  saveCur();
  return shot;
}

function hit() {
  if (!selClub) { toast("Pick a club"); return; }
  const prev = swings(round.hole).slice(-1)[0] || null;
  const shot = appendShot(selClub, true, false);
  if (shot.lat == null) toast(selClub + " logged — NO POSITION");
  else if (prev && prev.lat != null)
    toast(prev.club + ": " + Math.round(hav(prev.lat, prev.lon, shot.lat, shot.lon)) + "m");
  else toast(selClub + " logged");
  selClub = null;
  render();
}

function addPutt() { appendShot("PUTT", false, false); toast("Putt " + putts(round.hole).length); render(); }

function undo() {
  const last = round.shots[round.shots.length - 1];
  if (!last) return;
  if (!confirm("Remove last: " + last.club + " (hole " + last.hole + ")?")) return;
  round.shots.pop();
  saveCur(); render();
}

function missedOne() {
  pickClub("Missed one — what did you hit?", club => {
    // Inserted at the end of the sequence with no position; the next real HIT
    // lands after it, which matches play order (you notice at the next ball).
    appendShot(club, false, true);
    toast(club + " added (no position)");
    render();
  });
}

function editClub() {
  const last = [...round.shots].reverse().find(s => s.club !== "PUTT");
  if (!last) return;
  pickClub("Change club (was " + last.club + ")", club => {
    last.club = club;
    saveCur(); toast("Now " + club); render();
  });
}

function nextHole() {
  const cur = COURSE.holes.find(x => x.num === round.hole);
  const lastShot = swings(round.hole).slice(-1)[0];
  if (lastShot && lastShot.lat != null && cur && cur.green)
    toast("Last: " + Math.round(hav(lastShot.lat, lastShot.lon, cur.green.centre[0], cur.green.centre[1])) + "m to centre");
  if (round.hole >= 18) { endRound(); return; }
  round.hole++;
  target = null;
  saveCur(); render();
}

function endRound() {
  if (!confirm(round.hole >= 18 ? "Finish round?" : "End round early?")) return;
  round.endTs = Date.now();
  const rounds = loadRounds();
  rounds.push(round);
  localStorage.setItem(LS_ROUNDS, JSON.stringify(rounds));
  const finished = round;
  localStorage.removeItem(LS_CUR);
  round = null;
  stopGPS();
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
  showDone(finished);
}

// ---------- export ----------
async function exportText(text, label) {
  if (navigator.share) {
    try { await navigator.share({ title: label, text }); return; } catch (e) { if (e.name === "AbortError") return; }
  }
  try { await navigator.clipboard.writeText(text); alert(label + " copied to clipboard"); }
  catch {
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); ta.remove();
    alert(label + " copied to clipboard");
  }
}

// ---------- UI ----------
function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("on"));
  $(id).classList.add("on");
}
function toast(msg) {
  $("toast").textContent = msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { $("toast").textContent = ""; }, 6000);
}

function pickClub(title, cb) {
  $("ovTitle").textContent = title;
  const g = $("ovGrid");
  g.innerHTML = "";
  for (const c of CLUBS) {
    const b = document.createElement("button");
    b.textContent = c;
    b.onclick = () => { $("overlay").classList.remove("on"); cb(c); };
    g.appendChild(b);
  }
  $("overlay").classList.add("on");
}
$("ovCancel").onclick = () => $("overlay").classList.remove("on");

function buildClubGrid() {
  const g = $("clubs");
  for (const c of CLUBS) {
    const b = document.createElement("button");
    b.textContent = c;
    b.onclick = () => { selClub = (selClub === c) ? null : c; render(); };
    b.dataset.club = c;
    g.appendChild(b);
  }
}

function render() {
  if (!round) return;
  const cur = COURSE.holes.find(x => x.num === round.hole);
  $("holeInfo").innerHTML = "H" + round.hole + " <small>PAR " + cur.par + "</small> &nbsp;S" + swings(round.hole).length;
  $("btnNext").innerHTML = round.hole >= 18 ? "FINISH" : "NEXT &#9654;";
  const p = putts(round.hole).length;
  $("btnPutt").textContent = "+ PUTT" + (p ? " " + p : "");

  const age = lastFix ? Date.now() - lastFix.fixTs : Infinity;
  const gps = $("gps");
  if (!lastFix || age > FIX_DEAD_MS) {
    gps.textContent = lastRawAcc ? "NO FIX ±" + Math.round(lastRawAcc) + "m" : "NO GPS";
    gps.className = "gps-bad";
  } else {
    gps.textContent = "±" + lastFix.accuracy.toFixed(0) + "m" + (age > FIX_FRESH_MS ? " (" + Math.round(age/1000) + "s old)" : "");
    gps.className = age > FIX_FRESH_MS ? "gps-warn" : "gps-ok";
  }

  if (lastFix && age <= FIX_DEAD_MS && cur.green) {
    const d = t => Math.round(hav(lastFix.lat, lastFix.lon, cur.green[t][0], cur.green[t][1]));
    $("yF").textContent = $("mF").textContent = d("front");
    $("yC").textContent = $("mC").textContent = d("centre");
    $("yB").textContent = $("mB").textContent = d("back");
  } else {
    $("yF").textContent = $("yC").textContent = $("yB").textContent = "–";
    $("mF").textContent = $("mC").textContent = $("mB").textContent = "–";
  }
  if (mapMode) drawMap();

  document.querySelectorAll("#clubs button").forEach(b =>
    b.classList.toggle("sel", b.dataset.club === selClub));
  $("btnHit").classList.toggle("armed", !!selClub);
}
setInterval(() => { if (round && document.visibilityState === "visible") render(); }, 2000);

function showDone(r) {
  const holes = [...new Set(r.shots.map(s => s.hole))].length;
  const total = r.shots.length;
  const est = r.shots.filter(s => s.estimated).length;
  $("doneSummary").textContent =
    total + " shots over " + holes + " holes" + (est ? "\n" + est + " without position" : "");
  show("done");
  // Share needs a user gesture, so the "auto-prompt" is this screen itself:
  // export is the only primary action on it.
  $("btnExportRound").onclick = () => exportText(JSON.stringify(r), "Round " + new Date(r.startTs).toISOString().slice(0,10));
}

// ---------- wire up ----------
buildClubGrid();
$("btnStart").onclick = startRound;
$("btnResume").onclick = resumeRound;
$("btnHit").onclick = hit;
$("btnPutt").onclick = addPutt;
$("btnUndo").onclick = undo;
$("btnMissed").onclick = missedOne;
$("btnEditClub").onclick = editClub;
$("btnNext").onclick = nextHole;
$("btnEnd").onclick = endRound;
$("btnDoneHome").onclick = () => { renderStart(); show("start"); };
$("btnExportAll").onclick = () => {
  const rounds = loadRounds();
  if (!rounds.length) { alert("No rounds yet"); return; }
  exportText(JSON.stringify(rounds), rounds.length + " rounds");
};

function renderStart() {
  const rounds = loadRounds();
  $("roundCount").textContent = rounds.length + " round" + (rounds.length === 1 ? "" : "s") + " stored on this phone";
  $("btnResume").style.display = loadCur() ? "block" : "none";
}
renderStart();

// Crash recovery: if a round was mid-flight, go straight back into it.
if (loadCur()) resumeRound();

if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
</script>
</body>
</html>
